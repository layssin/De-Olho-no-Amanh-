<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B1120;
  --bg2:#111827;
  --bg3:#1F2937;
  --bg4:#374151;
  --blue:#1E3A8A;
  --blue-l:#2563EB;
  --blue-g:#3B82F6;
  --green:#10B981;
  --green-d:#059669;
  --orange:#F59E0B;
  --red:#EF4444;
  --white:#F9FAFB;
  --muted:#9CA3AF;
  --border:#374151;
  --font:'Syne',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--white);font-family:var(--font)}
#root{height:100vh;display:flex;flex-direction:column}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.logo-area{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-icon{font-size:24px;margin-bottom:6px}
.logo-name{font-size:15px;font-weight:800;color:var(--white);letter-spacing:-.3px;line-height:1.2}
.logo-sub{font-size:10px;color:var(--green);font-weight:600;margin-top:3px;letter-spacing:.8px;text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-section{padding:10px 16px 4px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:.15s;border-left:3px solid transparent;font-size:12px;font-weight:500;color:var(--muted);user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--white)}
.nav-item.active{background:rgba(37,99,235,.15);color:var(--blue-g);border-left-color:var(--blue-g)}
.nav-icon{font-size:15px;min-width:18px}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border)}
.user-name{font-size:12px;font-weight:700;color:var(--white)}
.user-role{font-size:10px;color:var(--muted);margin-top:1px}
.online-dot{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;flex-shrink:0}
.header-title{font-size:15px;font-weight:700;flex:1}
.header-badge{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px}
.content{flex:1;overflow-y:auto;padding:20px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:var(--font);white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-l));color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg3);color:var(--white);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4)}
.btn-green{background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff}
.btn-green:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden;transition:.2s}
.card:hover{border-color:var(--bg4);transform:translateY(-1px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.blue::before{background:linear-gradient(90deg,var(--blue),var(--blue-g))}
.card.green::before{background:linear-gradient(90deg,var(--green-d),var(--green))}
.card.orange::before{background:linear-gradient(90deg,#D97706,var(--orange))}
.card.red::before{background:linear-gradient(90deg,#DC2626,var(--red))}
.card-icon{font-size:22px;margin-bottom:8px}
.card-value{font-size:26px;font-weight:800;color:var(--white);font-family:var(--mono)}
.card-label{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;line-height:1.3}
.card-delta{font-size:10px;margin-top:7px;font-weight:600}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-warn{color:var(--orange)}

/* SECTIONS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}

/* TABLES */
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.table-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.table-title{font-size:13px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;color:var(--muted);padding:10px 14px;text-align:left;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:rgba(17,24,39,.6);white-space:nowrap}
td{font-size:12px;padding:9px 14px;border-bottom:1px solid rgba(55,65,81,.4);color:#E5E7EB}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-green{background:rgba(16,185,129,.12);color:#10B981}
.b-blue{background:rgba(59,130,246,.12);color:#3B82F6}
.b-orange{background:rgba(245,158,11,.12);color:#F59E0B}
.b-red{background:rgba(239,68,68,.12);color:#EF4444}
.b-gray{background:rgba(156,163,175,.1);color:#9CA3AF}
.b-purple{background:rgba(139,92,246,.12);color:#A78BFA}
.b-teal{background:rgba(20,184,166,.12);color:#2DD4BF}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--white);font-family:var(--font);outline:none;transition:.15s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue-g);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-select option{background:var(--bg3);color:var(--white)}
.form-textarea{resize:vertical;min-height:80px}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.chart-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:10px;color:var(--muted);min-width:80px;text-align:right;line-height:1.2}
.bar-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.bar-val{font-size:10px;font-family:var(--mono);min-width:32px;color:var(--white)}

/* KANBAN */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:300px}
.kanban-col{min-width:195px;max-width:195px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.kanban-head{padding:10px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.kanban-count{background:var(--bg);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.kanban-body{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto}
.kanban-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:.15s}
.kanban-card:hover{border-color:var(--blue-g);transform:translateY(-1px)}
.kanban-card-title{font-size:11px;font-weight:700;margin-bottom:4px;line-height:1.3}
.kanban-card-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* GAUGES */
.gauge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.gauge-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.gauge-val{font-size:30px;font-weight:800;font-family:var(--mono);line-height:1}
.gauge-label{font-size:11px;color:var(--muted);margin-top:6px;font-weight:600}
.gauge-sub{font-size:10px;color:var(--muted);margin-top:2px}
.gauge-bar{height:6px;background:var(--bg2);border-radius:3px;margin-top:10px;overflow:hidden}
.gauge-fill{height:100%;border-radius:3px;transition:width 1.2s ease}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:620px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* AI BOX */
.ai-box{background:linear-gradient(135deg,rgba(30,58,138,.25),rgba(16,185,129,.08));border:1px solid rgba(59,130,246,.25);border-radius:12px;padding:16px;margin-bottom:16px}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ai-icon{font-size:18px}
.ai-title{font-size:13px;font-weight:700;color:var(--blue-g)}
.ai-text{font-size:12px;color:#D1D5DB;line-height:1.7}

/* ALERTS */
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:10px;font-size:12px;line-height:1.5}
.alert-orange{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:#FCD34D}
.alert-red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#FCA5A5}
.alert-green{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#6EE7B7}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content}
.tab{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;color:var(--muted);user-select:none}
.tab.active{background:var(--bg2);color:var(--white);border:1px solid var(--border)}
.tab:hover:not(.active){color:var(--white)}

/* ACTION BAR */
.action-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--white);font-family:var(--font);outline:none;min-width:200px}
.search-bar:focus{border-color:var(--blue-g)}
.search-bar::placeholder{color:var(--muted)}

/* STAT ITEMS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.stat-val{font-size:20px;font-weight:800;font-family:var(--mono)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}

/* CRP BAR */
.crp-prog{height:14px;border-radius:6px;position:relative;overflow:hidden;background:var(--bg2);margin-top:4px}
.crp-fill{height:100%;border-radius:6px;position:absolute;top:0;left:0;transition:width 1.2s ease}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-month{font-size:16px;font-weight:700}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px;min-height:72px;transition:.15s}
.cal-cell:hover{border-color:var(--bg4)}
.cal-cell.today{border-color:var(--blue-g)}
.cal-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
.cal-cell.today .cal-num{color:var(--blue-g)}
.cal-cell.other-month .cal-num{opacity:.3}
.cal-ev{border-left:2px solid;padding:2px 4px;border-radius:0 3px 3px 0;font-size:9px;margin-bottom:2px;line-height:1.3}
.cal-ev.blue{background:rgba(59,130,246,.15);border-color:var(--blue-g);color:#BFDBFE}
.cal-ev.green{background:rgba(16,185,129,.15);border-color:var(--green);color:#A7F3D0}
.cal-ev.orange{background:rgba(245,158,11,.15);border-color:var(--orange);color:#FDE68A}
.cal-ev.red{background:rgba(239,68,68,.15);border-color:var(--red);color:#FECACA}

/* FORMULA BOX */
.formula-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:11px;margin-bottom:8px;line-height:1.6}

/* AI REPORT TEXT */
.report-text{white-space:pre-wrap;font-family:var(--font);font-size:12px;line-height:1.8;color:#D1D5DB}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* COLORS */
.c-green{color:var(--green)}
.c-red{color:var(--red)}
.c-orange{color:var(--orange)}
.c-blue{color:var(--blue-g)}
.c-muted{color:var(--muted)}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:16px 0}

/* TAG */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg4);color:var(--muted)}

/* BOM TOTAL ROW */
.total-row td{background:rgba(16,185,129,.06);font-weight:700}
</style>
</head>

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════

function calcPMP(item){
  const demTotal = Math.max(item.demPrev, item.pedirme);
  const qtdProd = Math.max(0, demTotal + item.estoqueSeg - item.estoqueIni);
  return { ...item, demTotal, necLiq: qtdProd, qtdProd };
}

function calcMRP(pmpItems, bomItems, stockItems){
  const rows = [];
  pmpItems.forEach(p => {
    const pmpCalc = calcPMP(p);
    const comps = bomItems.filter(b => b.pai === p.produto);
    comps.forEach(b => {
      const necBruta = Math.round(pmpCalc.qtdProd * b.qtd * (1 + b.perda/100));
      const estoqAtual = stockItems.find(s => s.produto === b.comp)
        ? stockItems.find(s => s.produto === b.comp).ini + stockItems.find(s => s.produto === b.comp).entradas - stockItems.find(s => s.produto === b.comp).saidas
        : b.estoqueDisp;
      const necLiq = Math.max(0, necBruta + b.leadtime*5 - estoqAtual); // proxy for seg stock
      const acao = necLiq === 0 ? 'Usar Estoque' : b.tipo === 'Matéria-Prima' || b.tipo === 'Embalagem' ? 'Comprar' : 'Produzir';
      rows.push({
        pai: p.produto, periodo: p.periodo, qtdPlan: pmpCalc.qtdProd,
        comp: b.comp, qtdPorUn: b.qtd, perda: b.perda,
        necBruta, estoqAtual, estoqueSeg: Math.round(b.leadtime*5),
        necLiq, leadtime: b.leadtime,
        dataNecess: '2025-04-25', dataCompra: '2025-04-' + (25 - b.leadtime),
        acao
      });
    });
  });
  return rows;
}

function calcCRP(item){
  const tempoTotal = item.qtdPlan * item.tempoPad;
  const capUtil = (tempoTotal / item.capDia) * 100;
  const capOciosa = Math.max(0, item.capDia - tempoTotal);
  const sobrecarga = Math.max(0, tempoTotal - item.capDia);
  const status = capUtil > 100 ? 'Sobrecarga' : capUtil > 75 ? 'Atenção' : 'Disponível';
  return { ...item, tempoTotal: +tempoTotal.toFixed(1), capUtil: +capUtil.toFixed(2), capOciosa: +capOciosa.toFixed(1), sobrecarga: +sobrecarga.toFixed(1), status };
}

function calcStock(s){ const atual = s.ini + s.entradas - s.saidas; return { ...s, atual, status: atual < s.seg ? 'Crítico' : atual < s.seg * 1.2 ? 'Atenção' : 'Normal' }; }

function StatusBadge({ status }){
  const map = {
    'Ativo':'b-green','Planejado':'b-blue','Aprovado':'b-teal','Em Andamento':'b-blue',
    'Concluído':'b-green','Pausada':'b-orange','Atrasada':'b-red','Cancelado':'b-gray',
    'Vencendo':'b-orange','Vencido':'b-red','Normal':'b-green','Crítico':'b-red',
    'Sobrecarga':'b-red','Atenção':'b-orange','Disponível':'b-green','Liberado':'b-purple',
    'Comprar':'b-orange','Usar Estoque':'b-green','Produzir':'b-blue','Ruptura':'b-red',
    'Inativo':'b-gray','Liberado':'b-purple','Em Produção':'b-teal',
  };
  return <span className={`badge ${map[status]||'b-gray'}`}>{status}</span>;
}

function MiniBar({ val, max, color='#3B82F6' }){
  const pct = Math.min(100, Math.round((val/(max||1))*100));
  return <div className="bar-track"><div className="bar-fill" style={{ width: pct+'%', background: color }}/></div>;
}

function Produtos({ products, setProducts }){

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase()) || p.id.toLowerCase().includes(search.toLowerCase())
  );

  const openNew = () => { setEdit(null); setForm(emptyForm); setModal(true); };
  const openEdit = p => { setEdit(p); setForm({...p}); setModal(true); };
  const remove = id => { if(confirm('Excluir produto?')) setProducts(products.filter(p=>p.id!==id)); };

  const save = () => {
    if(!form.id||!form.name){ alert('Código e Nome obrigatórios.'); return; }

    setModal(false);
  };

  return (
    <div>
      <div className="action-bar">
        <input className="search-bar" placeholder="🔍 Buscar por código ou nome..." value={search} onChange={e=>setSearch(e.target.value)}/>

function MRP({ pmp, bom, stock }){
  const [tick, setTick] = React.useState(0);
  const pmpCalc = pmp.map(calcPMP);
  const mrp = calcMRP(pmpCalc, bom, stock.map(calcStock));
  const comprar = mrp.filter(m=>m.acao==='Comprar');

  function exportarListaCompras(){
    const linhas = comprar.map(m =>
      `${m.comp}\tQtd Necessária: ${m.necLiq}\tLead Time: ${m.leadtime}d\tData Compra: ${m.dataCompra}\tProduto Pai: ${m.pai}`
    );
    const csv = 'Componente\tQtd Necessária\tLead Time\tData Compra\tProduto Pai\n' + linhas.join('\n');
    const blob = new Blob([csv], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'lista_compras_mrp.txt'; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div>
      <div className="action-bar">
        <button className="btn btn-primary" onClick={()=>setTick(t=>t+1)}>🔄 Recalcular MRP</button>
        <button className="btn btn-secondary" onClick={exportarListaCompras} disabled={comprar.length===0}>📄 Exportar Lista de Compras</button>
      </div>
      {comprar.length > 0 && (
        <div className="alert alert-orange">⚠️ <strong>{comprar.length} item(ns) necessitam compra.</strong> Verifique as datas sugeridas e emita as ordens de compra.</div>
      )}
      <div className="table-wrap">
        <div className="table-header"><span className="table-title">Planejamento de Necessidade de Materiais — MRP ({mrp.length} linhas)</span></div>
        <table>
          <thead><tr><th>Prod. Pai</th><th>Período</th><th>Qtd PMP</th><th>Componente</th><th>Qtd/Un</th><th>Nec. Bruta</th><th>Est. Atual</th><th>Nec. Líquida</th><th>Lead Time</th><th>Data Necessária</th><th>Data Compra</th><th>Ação</th></tr></thead>
          <tbody>
            {mrp.map((m,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600,color:'var(--blue-g)'}}>{m.pai}</td>
                <td>{m.periodo}</td>
                <td style={{fontFamily:'var(--mono)'}}>{m.qtdPlan}</td>
                <td style={{fontWeight:600}}>{m.comp}</td>
                <td style={{fontFamily:'var(--mono)'}}>{m.qtdPorUn}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--orange)'}}>{m.necBruta}</td>
                <td style={{fontFamily:'var(--mono)',color:m.estoqAtual<m.estoqueSeg?'var(--red)':'var(--green)'}}>{m.estoqAtual}</td>
                <td style={{fontFamily:'var(--mono)',fontWeight:700,color:m.necLiq>0?'var(--red)':'var(--green)'}}>{m.necLiq}</td>
                <td>{m.leadtime}d</td>
                <td style={{fontFamily:'var(--mono)'}}>{m.dataNecess}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--orange)'}}>{m.dataCompra}</td>
                <td><StatusBadge status={m.acao}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

          <tbody>
            {items.map(c=>(
              <tr key={c.id}>
                <td style={{fontFamily:'var(--mono)',color:'var(--blue-g)',fontWeight:600}}>{c.ordem}</td>
                <td style={{fontWeight:600}}>{c.produto}</td>

                <td style={{fontFamily:'var(--mono)'}}>{c.tempoPad}h</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--orange)',fontWeight:600}}>{c.tempoTotal}h</td>
                <td style={{fontFamily:'var(--mono)'}}>{c.capDia}h</td>
                <td style={{fontFamily:'var(--mono)',fontWeight:700,color:c.capUtil>100?'var(--red)':c.capUtil>75?'var(--orange)':'var(--green)'}}>{c.capUtil.toFixed(2)}%</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--green)'}}>{c.capOciosa > 0 ? c.capOciosa+'h' : '—'}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--red)',fontWeight:c.sobrecarga>0?700:400}}>{c.sobrecarga > 0 ? c.sobrecarga+'h' : '—'}</td>
                <td>{c.turno}</td>
                <td><StatusBadge status={c.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="chart-box" style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:12,padding:16}}>
        <div className="chart-title">Fórmulas CRP Aplicadas</div>
        {items.map(c=>(
          <div key={c.id} className="formula-box">
            <span className="c-blue">[{c.ordem}] {c.ct}</span><br/>
            Tempo Total = {c.qtdPlan} × {c.tempoPad}h = <strong>{c.tempoTotal}h</strong><br/>
            Cap. Utilizada = {c.tempoTotal}h ÷ {c.capDia}h × 100 = <strong className={c.capUtil>100?'c-red':c.capUtil>75?'c-orange':'c-green'}>{c.capUtil.toFixed(2)}%</strong>
            {c.sobrecarga > 0 && <><br/><span className="c-red">⚠️ Sobrecarga = {c.tempoTotal}h − {c.capDia}h = {c.sobrecarga}h</span></>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Estoque({ stock: rawStock, setStock }){
  const [stockData, setStockData] = React.useState(rawStock);
  const stock = stockData.map(calcStock);
  const criticos = stock.filter(s=>s.status==='Crítico');
  const [modal, setModal] = React.useState(false);
  const emptyMov = { produto: rawStock[0]?.produto||'', tipo: 'Entrada', qtd: '', obs: '' };
  const [form, setForm] = React.useState(emptyMov);

  function registrar(){
    if(!form.produto||!form.qtd||+form.qtd<=0){ alert('Produto e quantidade são obrigatórios.'); return; }
    setStockData(prev => prev.map(s => {
      if(s.produto !== form.produto) return s;
      if(form.tipo === 'Entrada') return { ...s, entradas: s.entradas + (+form.qtd) };
      return { ...s, saidas: s.saidas + (+form.qtd) };
    }));
    alert(`Movimentação registrada: ${form.tipo} de ${form.qtd} un. em "${form.produto}"`);
    setForm(emptyMov);
    setModal(false);
  }

  function exportar(){
    const linhas = stock.map(s => `${s.produto}\t${s.tipo}\t${s.ini}\t${s.entradas}\t${s.saidas}\t${s.atual}\t${s.seg}\t${s.min}\t${s.status}`);
    const csv = 'Produto\tTipo\tEst.Ini\tEntradas\tSaídas\tEst.Atual\tEst.Seg\tEst.Mín\tStatus\n' + linhas.join('\n');
    const blob = new Blob([csv], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='estoque.txt'; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div>
      <div className="action-bar">
        <button className="btn btn-primary" onClick={()=>setModal(true)}>＋ Registrar Movimentação</button>
        <button className="btn btn-secondary" onClick={exportar}>📄 Exportar</button>
      </div>
      {modal && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">Registrar Movimentação de Estoque</span>
              <button className="btn btn-secondary btn-sm" onClick={()=>setModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-group">
                  <label className="form-label">Produto</label>
                  <select className="form-select" value={form.produto} onChange={e=>setForm({...form,produto:e.target.value})}>
                    {rawStock.map(s=><option key={s.produto}>{s.produto}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Tipo de Movimentação</label>
                  <select className="form-select" value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}>
                    <option>Entrada</option>
                    <option>Saída</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Quantidade</label>
                  <input type="number" className="form-input" value={form.qtd} onChange={e=>setForm({...form,qtd:e.target.value})} min="1"/>
                </div>
                <div className="form-group" style={{gridColumn:'1/-1'}}>
                  <label className="form-label">Observação</label>
                  <input className="form-input" value={form.obs} onChange={e=>setForm({...form,obs:e.target.value})} placeholder="Ex: Recebimento NF 1234, Saída OP-001..."/>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={registrar}>💾 Registrar</button>
            </div>
          </div>
        </div>
      )}

      {criticos.length > 0 && (
        <div className="alert alert-red">🔴 <strong>Estoque crítico em {criticos.length} item(ns):</strong> {criticos.map(s=>s.produto).join(', ')}. Emitir ordens de compra.</div>
      )}
      <div className="stat-row">
        <div className="stat-item"><div className="stat-val">{stock.length}</div><div className="stat-lbl">Total de Itens</div></div>
        <div className="stat-item"><div className="stat-val c-green">{stock.filter(s=>s.status==='Normal').length}</div><div className="stat-lbl">Status Normal</div></div>
        <div className="stat-item"><div className="stat-val c-red">{criticos.length}</div><div className="stat-lbl">Estoque Crítico</div></div>
        <div className="stat-item"><div className="stat-val c-orange">{stock.filter(s=>s.status==='Atenção').length}</div><div className="stat-lbl">Em Atenção</div></div>
      </div>
      <div className="table-wrap">
        <div className="table-header"><span className="table-title">Controle de Estoque</span></div>
        <table>
          <thead><tr><th>Produto</th><th>Tipo</th><th>Est. Inicial</th><th>Entradas</th><th>Saídas</th><th>Est. Atual</th><th>Est. Seg.</th><th>Est. Mín.</th><th>Cobertura</th><th>Status</th></tr></thead>
          <tbody>
            {stock.map((s,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{s.produto}</td>
                <td><span className="badge b-gray">{s.tipo}</span></td>
                <td style={{fontFamily:'var(--mono)'}}>{s.ini}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--green)'}}>+{s.entradas}</td>
                <td style={{fontFamily:'var(--mono)',color:'var(--red)'}}>−{s.saidas}</td>
                <td style={{fontFamily:'var(--mono)',fontWeight:700,color:s.atual<s.seg?'var(--red)':s.atual<s.seg*1.2?'var(--orange)':'var(--green)'}}>{s.atual}</td>
                <td style={{fontFamily:'var(--mono)'}}>{s.seg}</td>
                <td style={{fontFamily:'var(--mono)'}}>{s.min}</td>
                <td style={{minWidth:100}}><MiniBar val={s.atual} max={Math.max(s.atual,s.seg)*1.4} color={s.atual<s.seg?'#EF4444':s.atual<s.seg*1.2?'#F59E0B':'#10B981'}/></td>
                <td><StatusBadge status={s.status}/></td>

            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Contratos({ contracts, setContracts }){
  const vencendo = contracts.filter(c=>c.status==='Vencendo');
  const vencidos = contracts.filter(c=>c.status==='Vencido');
  const [modal, setModal] = React.useState(false);
  const [edit, setEdit] = React.useState(null);

  const emptyForm = { numero:'', tipo:'Cliente', empresa:'', cnpj:'', produto:'', valor:'', inicio:'', venc:'', renovacao:'30', responsavel:'', status:'Ativo', obs:'' };
  const [form, setForm] = React.useState(emptyForm);

  function openNew(){ setEdit(null); setForm({...emptyForm, numero: (new Date().getFullYear())+'-'+(contracts.length+1).toString().padStart(3,'0')}); setModal(true); }
  function openEdit(c){ setEdit(c); setForm({...c, valor: c.valor.toString()}); setModal(true); }
  function remove(id){ if(confirm('Excluir contrato?')) setContracts(contracts.filter(c=>c.id!==id)); }

  function salvar(){
    if(!form.empresa||!form.venc){ alert('Empresa e data de vencimento são obrigatórios.'); return; }
    const obj = { ...form, id: edit ? edit.id : 'C'+(contracts.length+1).toString().padStart(3,'0'), valor: +form.valor, renovacao: +form.renovacao };
    if(edit) setContracts(contracts.map(c=>c.id===edit.id?obj:c));
    else setContracts([...contracts, obj]);
    setModal(false);
  }

  return (
    <div>
      <div className="action-bar">
        <button className="btn btn-primary" onClick={openNew}>＋ Novo Contrato</button>
      </div>
      {vencidos.length > 0 && <div className="alert alert-red">🔴 <strong>{vencidos.length} contrato(s) vencido(s):</strong> {vencidos.map(c=>c.empresa).join(', ')}. Regularizar situação imediatamente.</div>}
      {vencendo.length > 0 && <div className="alert alert-orange">⚠️ <strong>{vencendo.length} contrato(s) vencendo em breve:</strong> {vencendo.map(c=>c.empresa).join(', ')}. Iniciar processo de renovação.</div>}
      <div className="stat-row">
        <div className="stat-item"><div className="stat-val c-green">{contracts.filter(c=>c.status==='Ativo').length}</div><div className="stat-lbl">Ativos</div></div>
        <div className="stat-item"><div className="stat-val c-orange">{vencendo.length}</div><div className="stat-lbl">Vencendo</div></div>
        <div className="stat-item"><div className="stat-val c-red">{vencidos.length}</div><div className="stat-lbl">Vencidos</div></div>
        <div className="stat-item"><div className="stat-val" style={{fontFamily:'var(--mono)'}}>R$ {(contracts.filter(c=>c.status==='Ativo').reduce((a,c)=>a+c.valor,0)/1000).toFixed(0)}k</div><div className="stat-lbl">Valor Total Ativo</div></div>
      </div>
      <div className="table-wrap">
        <div className="table-header"><span className="table-title">Gestão de Contratos ({contracts.length})</span></div>
        <table>
          <thead><tr><th>Número</th><th>Tipo</th><th>Empresa</th><th>CNPJ</th><th>Produto/Serviço</th><th>Valor</th><th>Início</th><th>Vencimento</th><th>Renovação</th><th>Responsável</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>
            {contracts.map(c=>(
              <tr key={c.id}>
                <td style={{fontFamily:'var(--mono)',color:'var(--blue-g)',fontWeight:600}}>{c.numero}</td>
                <td><span className="badge b-gray">{c.tipo}</span></td>
                <td style={{fontWeight:600}}>{c.empresa}</td>
                <td style={{fontFamily:'var(--mono)',fontSize:11}}>{c.cnpj}</td>
                <td>{c.produto}</td>
                <td style={{fontFamily:'var(--mono)'}}>R$ {c.valor.toLocaleString('pt-BR')}</td>
                <td style={{fontFamily:'var(--mono)',fontSize:11}}>{c.inicio}</td>
                <td style={{fontFamily:'var(--mono)',fontSize:11,color:c.status==='Vencido'?'var(--red)':c.status==='Vencendo'?'var(--orange)':'inherit'}}>{c.venc}</td>
                <td>{c.renovacao}d</td>
                <td>{c.responsavel}</td>

                  <button className="btn btn-secondary btn-sm" onClick={()=>openEdit(c)}>✏️</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>remove(c.id)}>🗑️</button>
                </td>

            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <div className="modal-overlay">

              <span className="modal-title">{edit?'Editar Contrato':'Novo Contrato'}</span>
              <button className="btn btn-secondary btn-sm" onClick={()=>setModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-group"><label className="form-label">Número</label><input className="form-input" value={form.numero} onChange={e=>setForm({...form,numero:e.target.value})}/></div>
                <div className="form-group"><label className="form-label">Tipo</label>
                  <select className="form-select" value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}>
                    <option>Cliente</option><option>Fornecedor</option><option>Parceiro</option>
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Empresa</label><input className="form-input" value={form.empresa} onChange={e=>setForm({...form,empresa:e.target.value})}/></div>
                <div className="form-group"><label className="form-label">CNPJ</label><input className="form-input" value={form.cnpj} onChange={e=>setForm({...form,cnpj:e.target.value})} placeholder="00.000.000/0001-00"/></div>
                <div className="form-group"><label className="form-label">Produto/Serviço</label><input className="form-input" value={form.produto} onChange={e=>setForm({...form,produto:e.target.value})}/></div>

                <div className="form-group"><label className="form-label">Data de Início</label><input type="date" className="form-input" value={form.inicio} onChange={e=>setForm({...form,inicio:e.target.value})}/></div>
                <div className="form-group"><label className="form-label">Data de Vencimento</label><input type="date" className="form-input" value={form.venc} onChange={e=>setForm({...form,venc:e.target.value})}/></div>
                <div className="form-group"><label className="form-label">Prazo Renovação (dias)</label><input type="number" className="form-input" value={form.renovacao} onChange={e=>setForm({...form,renovacao:e.target.value})}/></div>
                <div className="form-group"><label className="form-label">Responsável</label><input className="form-input" value={form.responsavel} onChange={e=>setForm({...form,responsavel:e.target.value})}/></div>
                <div className="form-group"><label className="form-label">Status</label>
                  <select className="form-select" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                    <option>Ativo</option><option>Vencendo</option><option>Vencido</option><option>Cancelado</option>
                  </select>
                </div>
                <div className="form-group" style={{gridColumn:'1/-1'}}><label className="form-label">Observações</label><textarea className="form-textarea" value={form.obs} onChange={e=>setForm({...form,obs:e.target.value})}/></div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={salvar}>💾 Salvar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Calendario({ demands, pmp, contracts }){
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for(let i=0; i<firstDay; i++) cells.push({day:0,events:[]});
  for(let d=1; d<=daysInMonth; d++){
    const evts = [];
    if(d===27 && month===3) evts.push({label:'Início OP-001',type:'blue'});
    if(d===28 && month===3) evts.push({label:'Compra Cobre',type:'orange'});
    if(d===15 && month===4) evts.push({label:'Entrega D001',type:'green'});
    if(d===14 && month===3) evts.push({label:'Compra urgente',type:'red'});
    if(d===1 && month===5) evts.push({label:'Entrega D002',type:'green'});
    if(d===15 && month===5) evts.push({label:'Contrato C002',type:'orange'});
    cells.push({day:d, events:evts, isToday: d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear()});
  }

  return (
    <div>
      <div className="cal-header">
        <div className="cal-nav">
          <button className="btn btn-secondary btn-sm" onClick={()=>{ if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1); }}>◀</button>
          <span className="cal-month">{months[month]} {year}</span>
          <button className="btn btn-secondary btn-sm" onClick={()=>{ if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1); }}>▶</button>
        </div>
        <div style={{display:'flex',gap:12,fontSize:11,color:'var(--muted)'}}>
          <span>🔵 Produção</span><span>🟢 Entrega</span><span>🟡 Compra</span><span>🔴 Urgente</span>
        </div>
      </div>
      <div className="cal-days-header">
        {days.map(d=><div key={d} className="cal-day-name">{d}</div>)}
      </div>
      <div className="cal-grid">
        {cells.map((c,i)=>(
          <div key={i} className={`cal-cell ${c.isToday?'today':''} ${c.day===0?'other-month':''}`}>
            {c.day>0 && <>
              <div className="cal-num">{c.day}</div>
              {c.events.map((e,j)=><div key={j} className={`cal-ev ${e.type}`}>{e.label}</div>)}
            </>}
          </div>
        ))}
      </div>
    </div>
  );
}

function RelatoriosIA({ demands, pmp, crp, stock, contracts }){
  const [loading, setLoading] = useState(false);
  const [report, setReport] = useState('');
  const [tipo, setTipo] = useState('executivo');
  const [lang, setLang] = useState('simples');
  const [saved, setSaved] = useState([
    {titulo:'Relatório Executivo — Abr/2025',data:'27/04/2025 09:15',tipo:'Executivo',conteudo:'Relatório salvo em 27/04/2025.\nConsulte o módulo de geração para criar novos relatórios.'},
    {titulo:'Análise de Gargalos — Sem.17',data:'25/04/2025 08:00',tipo:'CRP',conteudo:'Análise de CRP — Semana 17.\nGargalos identificados em Montagem A.'},
  ]);

  const crpCalc = crp.map(calcCRP);
  const stockCalc = stock.map(calcStock);
  const pmpCalc = pmp.map(calcPMP);
  const atrasadas = demands.filter(d=>d.status==='Atrasada');
  const criticos = stockCalc.filter(s=>s.status==='Crítico');
  const sobrecargas = crpCalc.filter(c=>c.capUtil>100);
  const vencendo = contracts.filter(c=>['Vencendo','Vencido'].includes(c.status));

  const gerarRelatorio = () => {
    setLoading(true);
    setReport('');
    setTimeout(()=>{
      const hoje = new Date().toLocaleDateString('pt-BR');
      let txt = '';
      if(tipo==='executivo' && lang==='simples'){
        txt = `📊 RELATÓRIO EXECUTIVO — DE OLHO NO AMANHÃ\n📅 Gerado em: ${hoje}\n\n`;
        txt += `✅ VISÃO GERAL\n`;
        txt += `• Total de demandas ativas: ${demands.filter(d=>!['Concluída','Cancelado'].includes(d.status)).length}\n`;
        txt += `• Produção planejada: ${pmpCalc.reduce((a,p)=>a+p.qtdProd,0)} unidades\n`;
        txt += `• Contratos ativos: ${contracts.filter(c=>c.status==='Ativo').length}\n\n`;
        if(atrasadas.length>0){ txt += `⚠️ DEMANDAS ATRASADAS (${atrasadas.length})\n`; atrasadas.forEach(d=>{ txt += `• ${d.id}: ${d.produto} — ${d.qtd} un. — Cliente: ${d.cliente}\n`; }); txt += '\n'; }
        if(criticos.length>0){ txt += `🔴 ESTOQUE CRÍTICO (${criticos.length} itens)\n`; criticos.forEach(s=>{ txt += `• ${s.produto}: ${s.atual} (segurança: ${s.seg}) — Compra urgente!\n`; }); txt += '\n'; }
        if(sobrecargas.length>0){ txt += `⚙️ GARGALOS PRODUTIVOS\n`; sobrecargas.forEach(c=>{ txt += `• ${c.ct} (${c.maquina}): ${c.capUtil.toFixed(1)}% — Sobrecarga: ${c.sobrecarga}h\n`; }); txt += '\n'; }
        if(vencendo.length>0){ txt += `📜 CONTRATOS CRÍTICOS\n`; vencendo.forEach(c=>{ txt += `• ${c.numero} — ${c.empresa} — Vencimento: ${c.venc} (${c.status})\n`; }); txt += '\n'; }
        txt += `🎯 RECOMENDAÇÕES PRIORITÁRIAS\n`;
        if(criticos.length>0) txt += `1. Emitir ordens de compra para itens críticos imediatamente.\n`;
        if(sobrecargas.length>0) txt += `2. Negociar turno extra ou terceirização para centros em sobrecarga.\n`;
        if(vencendo.length>0) txt += `3. Acionar processo de renovação dos contratos próximos ao vencimento.\n`;
        if(atrasadas.length>0) txt += `4. Revisar e priorizar demandas atrasadas junto à equipe de produção.\n`;
      } else if(tipo==='crp'){
        txt = `📊 RELATÓRIO CRP — CAPACIDADE PRODUTIVA\n📅 Gerado em: ${hoje}\n\n`;
        crpCalc.forEach(c=>{
          txt += `[${c.ordem}] ${c.ct} — ${c.produto}\n`;
          txt += `  Qtd Planejada: ${c.qtdPlan} un. | Tempo Padrão: ${c.tempoPad}h/un\n`;
          txt += `  Tempo Total: ${c.tempoTotal}h | Capacidade Diária: ${c.capDia}h\n`;
          txt += `  Capacidade Utilizada: ${c.capUtil.toFixed(2)}% | Status: ${c.status}\n`;
          if(c.sobrecarga>0) txt += `  ⚠️ SOBRECARGA: ${c.sobrecarga}h acima da capacidade\n`;
          else txt += `  ✅ Ociosidade disponível: ${c.capOciosa}h\n`;
          txt += '\n';
        });
      } else {
        txt = `📊 RELATÓRIO ${tipo.toUpperCase()} — LINGUAGEM TÉCNICA\n📅 Gerado em: ${hoje}\n\n`;
        txt += `PMP CONSOLIDADO:\n`;
        pmpCalc.forEach(p=>{ txt += `• ${p.id}: ${p.produto} | Período: ${p.periodo} | Qtd: ${p.qtdProd} un. | Status: ${p.status}\n`; });
        txt += `\nANÁLISE DE ESTOQUE:\n`;
        stockCalc.forEach(s=>{ txt += `• ${s.produto}: Atual=${s.atual} | Seg.=${s.seg} | Status: ${s.status}\n`; });
      }
      setReport(txt);
      setLoading(false);
    }, 1600);
  };

  const salvar = () => {
    if(!report) return;
    setSaved([{titulo:`Relatório ${tipo} — ${new Date().toLocaleDateString('pt-BR')}`, data:new Date().toLocaleString('pt-BR'), tipo, conteudo: report}, ...saved]);
    alert('Relatório salvo no histórico!');
  };

  const copiar = () => { if(report){ navigator.clipboard.writeText(report); alert('Copiado!'); } };

  const [viewModal, setViewModal] = useState(null);

  function pdfRelatorio(h){
    const w = window.open('','_blank');
    w.document.write('<html><body><pre style="font-family:monospace;white-space:pre-wrap;padding:20px;font-size:13px">' + (h.conteudo||h.titulo) + '</pre></body></html>');
    w.document.close(); w.print();

  return (
    <div>

          <option value="tecnico">Linguagem Técnica</option>
        </select>
        <button className="btn btn-green" onClick={gerarRelatorio} disabled={loading}>
          {loading ? '⏳ Gerando...' : '🤖 Gerar Relatório com IA'}
        </button>
      </div>

      {loading && (
        <div className="ai-box">
          <div className="ai-text">⏳ Analisando dados de PMP, MRP, CRP e estoque... Processando indicadores... Gerando insights gerenciais...</div>
        </div>
      )}

      {report && (
        <div className="ai-box" style={{marginBottom:16}}>
          <div className="ai-header">
            <span className="ai-icon">🤖</span>
            <span className="ai-title">Relatório Gerado</span>
            <div style={{marginLeft:'auto',display:'flex',gap:6,flexWrap:'wrap'}}>
              <button className="btn btn-secondary btn-sm" onClick={copiar}>📋 Copiar</button>
              <button className="btn btn-secondary btn-sm" onClick={salvar}>💾 Salvar</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>window.print()}>🖨️ Imprimir</button>
            </div>
          </div>
          <pre className="report-text">{report}</pre>
        </div>
      )}

      <div className="table-wrap">
        <div className="table-header"><span className="table-title">Histórico de Relatórios ({saved.length})</span></div>
        <table>
          <thead><tr><th>Título</th><th>Data/Hora</th><th>Tipo</th><th>Ações</th></tr></thead>
          <tbody>
            {saved.map((h,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{h.titulo}</td>
                <td style={{fontFamily:'var(--mono)',fontSize:11}}>{h.data}</td>
                <td><span className="badge b-blue">{h.tipo}</span></td>
                <td style={{display:'flex',gap:4}}>
                  <button className="btn btn-secondary btn-sm" onClick={()=>setViewModal(h)}>👁️ Ver</button>
                  <button className="btn btn-secondary btn-sm" onClick={()=>pdfRelatorio(h)}>📄 PDF</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {viewModal && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:700}}>
            <div className="modal-header">
              <span className="modal-title">📄 {viewModal.titulo}</span>
              <button className="btn btn-secondary btn-sm" onClick={()=>setViewModal(null)}>✕</button>
            </div>
            <div className="modal-body">
              <pre className="report-text">{viewModal.conteudo || '(Conteúdo não disponível)'}</pre>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setViewModal(null)}>Fechar</button>
              <button className="btn btn-primary" onClick={()=>pdfRelatorio(viewModal)}>📄 Imprimir PDF</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════
//  CONFIGURAÇÕES
// ══════════════════════════════════════════════

function Configuracoes(){
  return (
    <div>
      <div className="ai-box">
        <div className="ai-text">⚙️ <strong>Configurações do sistema.</strong> Gerencie usuários, permissões, centros de trabalho, máquinas e parâmetros do ERP.</div>
      </div>
      <div className="chart-grid">
        {[['👤 Usuários','Gerenciar contas e perfis de acesso'],['🔐 Permissões (RBAC)','Administrador, Gerente, Analista, Almoxarifado, Compras, Operador'],['⚙️ Centros de Trabalho','Cadastrar e configurar centros produtivos'],['🤖 IA e Relatórios','Configurar modelos e templates de relatórios'],['📅 Calendário Produtivo','Feriados, turnos e jornadas de trabalho'],['🔔 Notificações','Alertas de estoque, prazo e capacidade']].map(([t,d])=>(
          <div key={t} className="chart-box" style={{cursor:'pointer'}}>
            <div style={{fontSize:18,marginBottom:8}}>{t.split(' ')[0]}</div>
            <div style={{fontSize:13,fontWeight:700,color:'var(--white)',marginBottom:4}}>{t.slice(3)}</div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.5}}>{d}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  APP PRINCIPAL
// ══════════════════════════════════════════════

const navItems = [
  {id:'dashboard',icon:'',label:'Dashboard',section:'Principal'},
  {id:'produtos',icon:'',label:'Produtos',section:'Produção'},
  {id:'demandas',icon:'',label:'Demandas',section:'Produção'},
  {id:'bom',icon:'',label:'BOM',section:'Produção'},
  {id:'pmp',icon:'',label:'PMP',section:'Produção'},
  {id:'mrp',icon:'',label:'MRP',section:'Produção'},
  {id:'crp',icon:'',label:'CRP',section:'Produção'},
  {id:'estoque',icon:'',label:'Estoque',section:'Gestão'},
  {id:'contratos',icon:'',label:'Contratos',section:'Gestão'},
  {id:'calendario',icon:'',label:'Calendário',section:'Gestão'},
  {id:'ia',icon:'🤖',label:'Relatórios IA',section:'Gestão'},
  {id:'config',icon:'⚙️',label:'Configurações',section:'Sistema'},
];

function App(){
  const [active, setActive] = useState('dashboard');
  const [products, setProducts] = useState(initProducts);
  const [demands, setDemands] = useState(initDemands);
  const [contracts, setContracts] = useState(initContracts);
  const [bom] = useState(initBOM);
  const [pmp] = useState(initPMP);
  const [crp] = useState(initCRP);
  const [stock] = useState(initStock);

  const titles = {
    dashboard:'Dashboard Principal', produtos:'Cadastro de Produtos', demandas:'Gestão de Demandas',
    bom:'BOM — Estrutura do Produto', pmp:'Plano Mestre de Produção (PMP)',
    mrp:'MRP — Necessidade de Materiais', crp:'CRP — Capacidade Produtiva',
    estoque:'Controle de Estoque', contratos:'Gestão de Contratos',
    calendario:'Calendário Produtivo', ia:'Relatórios com Inteligência Artificial',
    config:'Configurações do Sistema',
  };

  const sections = [...new Set(navItems.map(n=>n.section))];

  const renderContent = () => {
    const props = { products, setProducts, demands, setDemands, contracts, setContracts, bom, pmp, crp, stock };
    switch(active){
      case 'dashboard': return <Dashboard {...props}/>;
      case 'produtos': return <Produtos {...props}/>;
      case 'demandas': return <Demandas {...props}/>;
      case 'bom': return <BOM {...props}/>;
      case 'pmp': return <PMP {...props}/>;
      case 'mrp': return <MRP {...props}/>;
      case 'crp': return <CRP {...props}/>;
      case 'estoque': return <Estoque {...props}/>;
      case 'contratos': return <Contratos {...props}/>;
      case 'calendario': return <Calendario {...props}/>;
      case 'ia': return <RelatoriosIA {...props}/>;
      case 'config': return <Configuracoes/>;
      default: return <Dashboard {...props}/>;
    }
  };

  const alertCount = demands.filter(d=>d.status==='Atrasada').length + stock.map(calcStock).filter(s=>s.status==='Crítico').length;

  return (
    <div className="app">
      <div className="sidebar">
        <div className="logo-area">
          <div className="logo-icon">👁️</div>
          <div className="logo-name">De Olho no Amanhã</div>
          <div className="logo-sub">ERP · PCP · v1.0</div>
        </div>
        <nav className="nav">
          {sections.map(section => (
            <div key={section}>
              <div className="nav-section">{section}</div>
              {navItems.filter(n=>n.section===section).map(n=>(
                <div key={n.id} className={`nav-item ${active===n.id?'active':''}`} onClick={()=>setActive(n.id)}>
                  <span className="nav-icon">{n.icon}</span>
                  {n.label}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-name">👤 Administrador</div>
          <div className="user-role">Analista de PCP</div>
          <div className="online-dot"><div className="dot"/><span>Sistema Online</span></div>
        </div>
      </div>

      <div className="main">
        <div className="header">
          <div className="header-title">{titles[active]}</div>
          <span className="header-badge">PCP ATIVO</span>
          {alertCount > 0 && (
            <div style={{background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.3)',color:'var(--red)',padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:700}}>
              🔴 {alertCount} alertas
            </div>
          )}
          <select style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 10px',fontSize:11,color:'var(--white)',fontFamily:'var(--font)'}}>
            <option>Todos os períodos</option><option>Abr/2025</option><option>Mai/2025</option><option>Jun/2025</option>
          </select>
          <button className="btn btn-green btn-sm" onClick={()=>setActive('ia')}>🤖 Gerar IA</button>
        </div>
        <div className="content">
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
